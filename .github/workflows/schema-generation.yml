name: Schema Generation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SCHEMA_ROOT: schema/00_pragmatic_bim_data_contract.yaml

on:
  push:
    branches: ["main"]
    paths:
      - "schema/**"
      - "scripts/generate_diagrams.py"
      - "scripts/generate_module_pages.py"
      - "docs/diagrams/**"
      - ".github/workflows/schema-generation.yml"
  pull_request:
    paths:
      - "schema/**"
      - "scripts/generate_diagrams.py"
      - "scripts/generate_module_pages.py"
      - "docs/diagrams/**"
      - ".github/workflows/schema-generation.yml"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Verify generated schema diagrams
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml
          python scripts/generate_diagrams.py --check

      - name: Install LinkML
        run: |
          python -m pip install --upgrade pip
          pip install linkml

      - name: Generate SHACL, JSON Schema, CSV, Pydantic, and docs
        run: |
          mkdir -p build/schema
          find_cmd() {
            for cmd in "$@"; do
              if command -v "$cmd" >/dev/null 2>&1; then
                echo "$cmd"
                return 0
              fi
            done
            return 1
          }

          CSV_CMD="$(find_cmd gen-csv csvgen)" || { echo "No CSV generator command found"; exit 1; }
          PYDANTIC_CMD="$(find_cmd gen-pydantic pydanticgen)" || { echo "No Pydantic generator command found"; exit 1; }
          DOC_CMD="$(find_cmd gen-markdown gen-docs gen-doc)" || { echo "No docs generator command found"; exit 1; }

          gen-shacl "$SCHEMA_ROOT" > build/schema/pragmatic-bim.shacl.ttl
          gen-json-schema "$SCHEMA_ROOT" > build/schema/pragmatic-bim.schema.json
          "$CSV_CMD" "$SCHEMA_ROOT" > build/schema/pragmatic-bim.csv
          "$PYDANTIC_CMD" "$SCHEMA_ROOT" > build/schema/pragmatic-bim.pydantic.py
          if [ "$DOC_CMD" = "gen-doc" ] || [ "$DOC_CMD" = "gen-docs" ]; then
            "$DOC_CMD" -d build/schema "$SCHEMA_ROOT"
            if [ -f build/schema/00_pragmatic_bim_data_contract.md ]; then
              cp build/schema/00_pragmatic_bim_data_contract.md build/schema/pragmatic-bim.docs.md
            elif [ -f build/schema/index.md ]; then
              cp build/schema/index.md build/schema/pragmatic-bim.docs.md
            else
              DOC_FILE="$(find build/schema -maxdepth 1 -type f -name '*.md' | head -n 1)"
              [ -n "$DOC_FILE" ] || { echo "No markdown documentation generated by gen-doc"; exit 1; }
              cp "$DOC_FILE" build/schema/pragmatic-bim.docs.md
            fi
          else
            "$DOC_CMD" "$SCHEMA_ROOT" > build/schema/pragmatic-bim.docs.md
          fi

      - name: Upload generated schemas
        uses: actions/upload-artifact@v4
        with:
          name: generated-schemas
          path: build/schema/
