id: https://schema.pragmaticbim.ch/requirements/enums
name: pragmatic_bim_requirements_schema_enums
title: Pragmatic BIM Data Contract - Requirements Enums
description: 'Controlled vocabularies for requirement drivers and assessment states.

  '
license: MIT
see_also:
- https://schema.pragmaticbim.ch/requirements/enums
- https://schema.pragmaticbim.ch/schema/pragmatic-bim.docs.html
prefixes:
  linkml: https://w3id.org/linkml/
  pbs: https://schema.pragmaticbim.ch/
  ifc: https://standards.buildingsmart.org/IFC/DEV/IFC4_3/FINAL/HTML/
  ifcowl: https://w3id.org/ifc/IFC4_ADD2#
  bot: https://w3id.org/bot#
default_prefix: pbs
default_range: string
imports:
- linkml:types
enums:
  ConnectionRequirementDriver:
    enum_uri: pbs:ConnectionRequirementDriver
    description: Main requirement drivers for connection element performance.
    permissible_values:
      fire:
        meaning: pbs:connection_requirement_driver_fire
      security:
        meaning: pbs:connection_requirement_driver_security
      accessibility:
        meaning: pbs:connection_requirement_driver_accessibility
      acoustic:
        meaning: pbs:connection_requirement_driver_acoustic
      thermal:
        meaning: pbs:connection_requirement_driver_thermal
      visual:
        meaning: pbs:connection_requirement_driver_visual
      structural:
        meaning: pbs:connection_requirement_driver_structural
  SeparatorRequirementDriver:
    enum_uri: pbs:SeparatorRequirementDriver
    description: Main requirement drivers for separator performance.
    permissible_values:
      acoustic:
        meaning: pbs:requirement_driver_acoustic
      fire:
        meaning: pbs:requirement_driver_fire
      thermal:
        meaning: pbs:requirement_driver_thermal
      privacy:
        meaning: pbs:requirement_driver_privacy
      hygiene:
        meaning: pbs:requirement_driver_hygiene
      structural:
        meaning: pbs:requirement_driver_structural
  SpatialAdjacencyKind:
    enum_uri: pbs:SpatialAdjacencyKind
    description: Spatial adjacency semantics for spatial requirements.
    permissible_values:
      adjacent_to:
        description: Subject must be adjacent to the related entity or space.
        meaning: pbs:spatial_adjacency_adjacent_to
      not_adjacent_to:
        description: Subject must not be adjacent to the related entity or space.
        meaning: pbs:spatial_adjacency_not_adjacent_to
      min_clear_distance:
        description: Minimum clear distance to the related entity or space.
        meaning: pbs:spatial_adjacency_min_clear_distance
  RequirementTargetOperator:
    enum_uri: pbs:RequirementTargetOperator
    description: Comparison operator for numeric or textual requirement targets.
    permissible_values:
      equals:
        meaning: pbs:requirement_target_operator_equals
      minimum:
        meaning: pbs:requirement_target_operator_minimum
      maximum:
        meaning: pbs:requirement_target_operator_maximum
      range:
        meaning: pbs:requirement_target_operator_range
