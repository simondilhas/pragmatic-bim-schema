id: https://schema.pragmaticbim.ch/shared/enums
name: pragmatic_bim_shared_schema_enums
title: Pragmatic BIM Data Contract - Shared Enums
description: Cross-pillar controlled vocabularies (content kind, status, quantities).
license: MIT
see_also:
- https://schema.pragmaticbim.ch/shared/enums
- https://schema.pragmaticbim.ch/schema/pragmatic-bim.docs.html
prefixes:
  linkml: https://w3id.org/linkml/
  pbs: https://schema.pragmaticbim.ch/
  ifc: https://standards.buildingsmart.org/IFC/DEV/IFC4_3/FINAL/HTML/
  ifcowl: https://w3id.org/ifc/IFC4_ADD2#
  bot: https://w3id.org/bot#
default_prefix: pbs
default_range: string
imports:
- linkml:types
enums:
  ContentKind:
    enum_uri: pbs:ContentKind
    description: Top-level content category for adapter projection and schema routing.
    permissible_values:
      physical:
        description: Tangible BIM element from the physical elements module.
        meaning: pbs:content_kind_physical
      virtual:
        description: Non-physical conceptual entity (space, system, time/cost record, etc.).
        meaning: pbs:content_kind_virtual
      context:
        description: Spatial context node (project, site, building, level, zone).
        meaning: pbs:content_kind_context
      requirement:
        description: Prescriptive requirement record.
        meaning: pbs:content_kind_requirement
      change:
        description: Revision diff or audit record.
        meaning: pbs:content_kind_change
  QuantityType:
    enum_uri: pbs:QuantityType
    permissible_values:
      area_net_horizontal:
        description: Net horizontal area, typically usable floor area excluding non-net parts.
        meaning: ifcowl:IfcQuantityArea
      area_gross_horizontal:
        description: Gross horizontal area, typically measured to outer boundaries.
        meaning: ifcowl:IfcQuantityArea
      area_net_vertical:
        description: Net vertical area, typically wall or facade area excluding deductions.
        meaning: ifcowl:IfcQuantityArea
      area_gross_vertical:
        description: Gross vertical area, typically full wall or facade area including non-net portions.
        meaning: ifcowl:IfcQuantityArea
      volume_net:
        description: Net enclosed volume after subtracting non-counted voids or deductions.
        meaning: ifcowl:IfcQuantityVolume
      volume_gross:
        description: Gross enclosed volume measured to external or gross boundaries.
        meaning: ifcowl:IfcQuantityVolume
      length:
        description: Linear extent of an element or feature.
        meaning: ifcowl:IfcQuantityLength
      width:
        description: Width dimension of an element, opening, or space proxy.
        meaning: ifcowl:IfcQuantityLength
      height:
        description: Height dimension of an element, opening, or space proxy.
        meaning: ifcowl:IfcQuantityLength
      perimeter:
        description: Boundary length around a 2D shape or footprint.
        meaning: ifcowl:IfcQuantityLength
  StatusType:
    enum_uri: pbs:StatusType
    description: Lifecycle or QA gate status used for model progression and approvals.
    permissible_values:
      draft:
        description: Work-in-progress state before formal review.
        meaning: pbs:status_draft
      submitted:
        description: Submitted state for review or approval.
        meaning: pbs:status_submitted
      reviewed:
        description: Reviewed state pending final approval decision.
        meaning: pbs:status_reviewed
      approved:
        description: Approved state accepted for downstream use.
        meaning: pbs:status_approved
      rejected:
        description: Rejected state not accepted for downstream use.
        meaning: pbs:status_rejected
      archived:
        description: Archived state no longer in use.
        meaning: pbs:status_archived
